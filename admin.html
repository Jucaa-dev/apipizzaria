<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorita Pizzaria</title>
    <!-- Adicionando o CSS do BootStrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- Adicionando a fonte do google fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- Adicionando o fontawesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Adicionando o FavIcon-->
    <link rel="shortcut icon" href="/src/favicon.ico" type="image/x-icon">

    <!-- Adicionando o meu CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- ESTA ORDEM IMPORTA!!!!!!!!!!!! -->


</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Cabeçalho da página -->
    <nav class="navbar navbar-expand-lg shadow-sm sticky-top bg-brand-amarelo">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center justify-content-center gap-2" href="">
                <div class="d-flex justify-content-center align-items-center">
                    <img class="logo" src="/src/piz.png" alt="logotipo pizzaria">
                    <span class="text-brand-vermelho fw-bold fs-4">
                        Favorita Pizzaria
                    </span>
                </div>
            </a>

            <!-- Adicionando o botão da responsividade -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="fa-solid fa-bars fa-lg" style="color: #b22424;"></span>
            </button>

            <!-- Criação do menu com links -->
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav text-brand-vermelho fw-semibold gap-lg-4">
                    <li class="nav-item">
                        <a class="nav-link text-brand-vermelho fs-5 dedinho" href="index.html">
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-brand-vermelho fs-5 dedinho" href="cardapio.html">
                            Cardápio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-brand-vermelho fs-5 dedinho" href="sobre.html">
                            Sobre Nós
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-brand-vermelho fs-5 dedinho" href="contato.html">
                            Contato
                        </a>
                    </li>
                    <li class="nav-item d-none" id="nav-admin">
                        <a class="nav-link text-brand-vermelho fs-5 dedinho" href="admin.html">
                            Admin
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Ícones -->
            <div class="d-flex align-items-center gap-4 text-brand-vermelho">
                <span class="fs-6 fw-bold d-none d-lg-block"></span>
                <a href="login.html" class="text-brand-vermelho text-decoration-none" id="btn-auth"
                    title="Login / Cadastro">
                    <i class="fa-solid fa-user fa-2xl" style="color: #b22424;"></i>
                </a>

                <a href="carrinho.html" class="text-brand-vermelho  text-decoration-none position-relative"
                    id="btn-auth">
                    <i class="fa-solid fa-cart-shopping fa-2xl" style="color: #b22424;"></i>
                    <span id="cart-count" class="badge bg-brand-vermelho rounded-pill cart-badge d-none">
                        0
                    </span>
                </a>
            </div>
        </div>
    </nav>
    <!-- Conteúdo principal da página -->
    <main class="flex-grow-1">
        <!-- Página de Login -->
        <div id="login-admin" class="container-fluid login-admin-container">
            <div class="card shadow p-4 text-center">
                <h3 class="mb-3">Acesso Restrito</h3>
                <div class="mb-3">
                    <input type="text" id="admin-cpf" class="form-control" placeholder="CPF admin">
                </div>
                <div class="mb-3">
                    <input type="password" id="admin-senha" class="form-control" placeholder="Senha">
                </div>
                <button id="btn-login-admin" class="btn btn-brand-vermelho w-100 fw-bold">
                    Entrar no Painel
                </button>
                <hr>
                <a href="./index.html" class="text-muted small">Voltar para o site</a>
            </div>
        </div>

        <!-- Painel administrativo -->
        <div id="painel-administrativo" class="py-5">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-brand-vermelho "><i class="fa-solid fa-gear"></i>Gestão de produtos</h2>
                    <button id="btn-cadastrar" class="btn btn-brand-vermelho fw-bold" data-bs-toggle="modal"
                        data-bs-target="#adminModalCadastrar">
                        <i class="fa-solid fa-plus"></i> Novo Produto
                    </button>
                    <button id="btn-logout" class="btn btn-outline-secondary">
                        Sair
                    </button>
                </div>

                <!-- Criação da tabela dos produtos -->
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0 table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <!-- Cabeçalho da tabela -->
                            <thead class="table-light">
                                <tr>
                                    <th>Código</th>
                                    <th>Nome</th>
                                    <th>Descrição</th>
                                    <th>Tipo</th>
                                    <th>Imagem</th>
                                    <th>Preço</th>
                                    <th class="text-end">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-admin">
                                <!-- Vai ser preenchida pelo js -->


                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>


    </main>

    <footer class="bg-brand-amarelo pt-5 pb-5 mt-auto"> <!-- Rodapé da página -->
        <div class="container">
            <div class="row text-center text-md-start g-4 align-items-center">
                <!-- Primeira Coluna -->
                <div class="col-md-4 d-flex flex-column align-items-center">
                    <div class="d-flex gap-3 fs-1 align-items-center">
                        <img class="icone" src="/src/mastercard.png" alt=" logotipo mastercard">
                        <img class="icone" src="/src/visa.png" alt="logotipo visa">
                        <i class="fa-brands fa-pix fa-lg" style="color: rgb(99, 230, 190);"></i>
                    </div>
                    <span class="text-brand-vermelho fw-bold small">
                        Formas de Pagamento
                    </span>
                </div>
                <!-- Segunda Coluna -->
                <div class="col-md-4 d-flex flex-column align-items-center">
                    <div class="dflex gap-3 fs-1">
                        <a href="" class="text-decoration-none">
                            <img class="rede" src="/src/facebook.png" alt="">
                        </a>
                        <a href="" class="text-decoration-none">
                            <img class="redes" src="/src/instagram.png" alt="">
                        </a>
                        <a href="" class="text-decoration-none">
                            <img class="redes" src="/src/whatsapp.png" alt="">
                        </a>
                    </div>
                </div>
                <!-- Terceira Coluna -->
                <div class="col-md-4 d-flex flex-column align-items-center">
                    <img class="rede" src="/src/email.png" alt="">
                    <span class="text-brand-vermelho fw-bold small">
                        falecom@favoritapizzaria.com.br
                    </span>
                </div>
            </div>
        </div>


    </footer>



    <!-- Adicionando o JavaScript do BootStrap -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>

</html>
